<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Detail — Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL@20,400,1" />
  <style>
    /* ── Detail Nav ── */
    .detail-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 1.2rem 3rem;
      background: rgba(250, 250, 248, 0.9);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .detail-back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Outfit', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 1.2rem;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
    }

    .detail-back:hover {
      color: var(--text);
      border-color: var(--accent-border);
      background: var(--accent-soft);
    }

    .detail-nav-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    /* ── Body ── */
    .detail-body {
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
    }

    /* ── Header ── */
    .detail-header {
      margin-bottom: 3rem;
    }

    .detail-year {
      display: inline-block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 0.25rem 0.7rem;
      border-radius: 6px;
      margin-bottom: 1rem;
    }

    .detail-header h1 {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.8rem;
    }

    .detail-header > p {
      font-size: 1.1rem;
      color: var(--text-muted);
      line-height: 1.8;
      max-width: 700px;
    }

    /* ── Screenshots ── */
    .detail-screenshots {
      margin-bottom: 3rem;
    }

    /* Web / tablet: landscape */
    .detail-screenshots.platform-web .screenshot-main,
    .detail-screenshots.platform-tablet .screenshot-main {
      width: 100%;
      aspect-ratio: 16/9;
    }

    .detail-screenshots.platform-web .screenshot-thumb,
    .detail-screenshots.platform-tablet .screenshot-thumb {
      width: 120px;
      height: 72px;
    }

    /* Mobile: portrait — centered, not full width */
    .detail-screenshots.platform-mobile .screenshot-main {
      width: 300px;
      aspect-ratio: 9/19.5;
      margin-left: auto;
      margin-right: auto;
    }

    .detail-screenshots.platform-mobile .screenshot-thumb {
      width: 48px;
      height: 100px;
    }

    .detail-screenshots.platform-mobile .screenshot-thumbs {
      justify-content: center;
    }

    .screenshot-main {
      background: linear-gradient(145deg, #E8E8E4, #D4D4CC);
      border-radius: 16px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 0.8rem;
    }

    .screenshot-main img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .screenshot-placeholder {
      font-size: 0.95rem;
      color: var(--text-muted);
      font-weight: 500;
      opacity: 0.6;
    }

    .screenshot-thumbs {
      display: flex;
      gap: 0.6rem;
      overflow-x: auto;
      padding-bottom: 0.5rem;
    }

    .screenshot-thumb {
      border-radius: 8px;
      border: 2px solid var(--border);
      background: linear-gradient(145deg, #E8E8E4, #D4D4CC);
      overflow: hidden;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.3s;
    }

    .screenshot-thumb.active {
      border-color: var(--accent);
    }

    .screenshot-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .screenshot-caption {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 0.5rem;
    }

    /* ── Sections ── */
    .detail-section {
      margin-bottom: 2.5rem;
    }

    .detail-section h2 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* ── Context ── */
    .context-block {
      padding: 2rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    .context-row {
      display: flex;
      gap: 1rem;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
    }

    .context-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .context-row:first-child {
      padding-top: 0;
    }

    .context-label {
      flex-shrink: 0;
      width: 80px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      padding-top: 0.15rem;
    }

    .context-value {
      font-size: 0.92rem;
      color: var(--text-muted);
      line-height: 1.8;
    }

    /* ── List Cards ── */
    .detail-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .detail-list-item {
      padding: 1rem 1.2rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.9rem;
      color: var(--text);
      display: flex;
      align-items: flex-start;
      gap: 0.7rem;
      line-height: 1.6;
    }

    .detail-list-item .bullet {
      flex-shrink: 0;
      margin-top: 2px;
      font-weight: 700;
    }

    .bullet-red { color: var(--orange); }
    .bullet-green { color: var(--green); }

    /* ── Tech Tags ── */
    .tech-tags-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    /* ── Links ── */
    .detail-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }

    .detail-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.2rem;
      font-size: 0.85rem;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid var(--accent-border);
      border-radius: 8px;
      text-decoration: none;
      transition: all 0.3s;
    }

    .detail-link:hover {
      background: var(--accent);
      color: #fff;
      transform: translateY(-1px);
    }

    /* ── Result ── */
    .detail-result {
      padding: 2rem;
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.04), rgba(22, 163, 74, 0.04));
      border: 1px solid var(--accent-border);
      border-radius: 14px;
    }

    .detail-result p {
      font-size: 1rem;
      color: var(--text);
      line-height: 1.9;
    }

    /* ── Not Found ── */
    .not-found {
      text-align: center;
      padding: 6rem 2rem;
    }

    .not-found h1 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 1rem;
    }

    .not-found p {
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .detail-nav { padding: 1rem 1.5rem; }
      .detail-nav-title { display: none; }
      .detail-body { padding: 2rem 1.5rem 4rem; }
      .detail-header h1 { font-size: 1.8rem; }
      .context-row { flex-direction: column; gap: 0.3rem; }
    }
  </style>
</head>

<body>

  <nav class="detail-nav">
    <a href="index.html#projects" class="detail-back"><span class="material-symbols-rounded" style="font-size:18px">arrow_back</span> Back to Projects</a>
    <span class="detail-nav-title" id="nav-title"></span>
  </nav>

  <main class="detail-body" id="detail-body"></main>

  <footer id="site-footer"></footer>

  <script src="projects-data.js"></script>
  <script src="components.js"></script>
  <script>
    renderFooter();

    const id = new URLSearchParams(window.location.search).get('id');
    const project = PROJECTS.find(p => p.id === id);
    const body = document.getElementById('detail-body');
    const navTitle = document.getElementById('nav-title');

    if (!project) {
      document.title = 'Project Not Found';
      body.innerHTML = `
        <div class="not-found">
          <h1>Project not found</h1>
          <p>The project you're looking for doesn't exist or has been removed.</p>
          <a href="index.html#projects" class="btn btn-primary"><span class="material-symbols-rounded" style="font-size:18px">arrow_back</span> View all projects</a>
        </div>
      `;
    } else {
      document.title = project.name + ' — Portfolio';
      navTitle.textContent = project.name;

      const platformClass = `platform-${project.platform || 'web'}`;

      const screenshotsHTML = project.screenshots.length > 0
        ? `
          <div class="detail-screenshots ${platformClass} fade-in fade-in-2">
            <div class="screenshot-main" id="main-screenshot">
              <img src="${project.screenshots[0].src}" alt="${project.screenshots[0].caption}">
            </div>
            ${project.screenshots.length > 1 ? `
              <div class="screenshot-thumbs">
                ${project.screenshots.map((s, i) => `
                  <div class="screenshot-thumb ${i === 0 ? 'active' : ''}" onclick="switchScreenshot(${i})">
                    <img src="${s.src}" alt="${s.caption}">
                  </div>
                `).join('')}
              </div>
            ` : ''}
            <p class="screenshot-caption" id="screenshot-caption">${project.screenshots[0].caption}</p>
          </div>
        `
        : '';

      const linksHTML = project.links && project.links.length > 0
        ? `
          <div class="detail-section fade-in fade-in-2" style="margin-top: -1rem;">
            <div class="detail-links">
              ${project.links.map(l => `
                <a href="${l.url}" target="_blank" rel="noopener noreferrer" class="detail-link">
                  ${l.label.includes('Android') ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.523 2.273l1.615-1.615a.5.5 0 0 0-.708-.708L16.77 1.61A8.275 8.275 0 0 0 12 0a8.275 8.275 0 0 0-4.77 1.61L5.57.05a.5.5 0 0 0-.708.708L6.477 2.373A8.236 8.236 0 0 0 3.75 8.5h16.5a8.236 8.236 0 0 0-2.727-6.227zM8.5 6a1 1 0 1 1 0-2 1 1 0 0 1 0 2zm7 0a1 1 0 1 1 0-2 1 1 0 0 1 0 2zM3.75 9.5v7.25A2.25 2.25 0 0 0 6 19h1v3.5a1.5 1.5 0 1 0 3 0V19h4v3.5a1.5 1.5 0 1 0 3 0V19h1a2.25 2.25 0 0 0 2.25-2.25V9.5zm-2.5 1A1.5 1.5 0 0 0 0 12v4a1.5 1.5 0 1 0 3 0v-4a1.5 1.5 0 0 0-1.5-1.5h-.25zm21.5 0A1.5 1.5 0 0 0 21 12v4a1.5 1.5 0 1 0 3 0v-4a1.5 1.5 0 0 0-1.5-1.5h-.25z"/></svg>'
                    : l.label.includes('iOS') ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>'
                    : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>'}
                  ${l.label}
                </a>
              `).join('')}
            </div>
          </div>
        `
        : '';

      body.innerHTML = `
        <div class="detail-header fade-in fade-in-1">
          <span class="detail-year">${project.year}</span>
          <h1>${project.name}</h1>
          <p>${project.description}</p>
        </div>

        ${linksHTML}

        ${screenshotsHTML}

        <div class="detail-section fade-in fade-in-3">
          <h2><span class="icon-badge icon-blue"><span class="material-symbols-rounded" style="font-size:16px">info</span></span> Context</h2>
          <div class="context-block">
            <div class="context-row">
              <span class="context-label">Client</span>
              <span class="context-value">${project.context.client}</span>
            </div>
            <div class="context-row">
              <span class="context-label">Problem</span>
              <span class="context-value">${project.context.problem}</span>
            </div>
          </div>
        </div>

        <div class="detail-section fade-in fade-in-4">
          <h2><span class="icon-badge icon-orange"><span class="material-symbols-rounded" style="font-size:16px">warning</span></span> Challenges</h2>
          <div class="detail-list">
            ${project.challenges.map(c => `
              <div class="detail-list-item">
                <span class="bullet bullet-red"><span class="material-symbols-rounded" style="font-size:16px">error</span></span> ${c}
              </div>
            `).join('')}
          </div>
        </div>

        <div class="detail-section fade-in fade-in-5">
          <h2><span class="icon-badge icon-green"><span class="material-symbols-rounded" style="font-size:16px">check_circle</span></span> Solutions</h2>
          <div class="detail-list">
            ${project.solutions.map(s => `
              <div class="detail-list-item">
                <span class="bullet bullet-green"><span class="material-symbols-rounded" style="font-size:16px">check_circle</span></span> ${s}
              </div>
            `).join('')}
          </div>
        </div>

        <div class="detail-section fade-in fade-in-6">
          <h2><span class="icon-badge icon-blue"><span class="material-symbols-rounded" style="font-size:16px">code</span></span> Tech Stack</h2>
          <div class="tech-tags-grid">
            ${project.techstack.map(t => `<span class="tech-tag">${t}</span>`).join('')}
          </div>
        </div>

        <div class="detail-section fade-in fade-in-7">
          <h2><span class="icon-badge icon-green"><span class="material-symbols-rounded" style="font-size:16px">star</span></span> Result</h2>
          <div class="detail-result">
            <p>${project.result}</p>
          </div>
        </div>
      `;
    }

    function switchScreenshot(index) {
      if (!project || !project.screenshots[index]) return;
      const main = document.getElementById('main-screenshot');
      const caption = document.getElementById('screenshot-caption');
      main.innerHTML = `<img src="${project.screenshots[index].src}" alt="${project.screenshots[index].caption}">`;
      caption.textContent = project.screenshots[index].caption;
      document.querySelectorAll('.screenshot-thumb').forEach((t, i) => {
        t.classList.toggle('active', i === index);
      });
    }
  </script>

</body>

</html>
